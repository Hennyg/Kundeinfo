<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Admin – Opret kundesurvey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="./assets/style.css" rel="stylesheet" />
  <style>
    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .grid2 { display:grid; grid-template-columns: 1fr; gap:16px; align-items:start; }
    .card { border:1px solid #ddd; border-radius:12px; padding:16px; background:#fff; margin:16px 0; max-width: 1200px; }
    .row { display:grid; grid-template-columns: 1fr 2fr; gap:10px; margin-bottom:10px; }
    .muted { color:#666; }
    input, select { width:100%; padding:.55rem; }
    .btnrow { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    table { width:100%; border-collapse: collapse; }
    th, td { border-bottom:1px solid #eee; padding:8px; text-align:left; vertical-align:top; }
    th { background:#fafafa; white-space:nowrap; }
    .hidden { display:none; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#f3f3f3; font-size:12px; }

    /* Kunde-autocomplete */
    .autocomplete { position:relative; }
    .autocomplete-list {
      position:absolute; z-index:20; left:0; right:0; top:calc(100% + 4px);
      background:#fff; border:1px solid #ddd; border-radius:8px;
      max-height:260px; overflow-y:auto; box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    .autocomplete-list .item { padding:8px 10px; cursor:pointer; }
    .autocomplete-list .item:hover, .autocomplete-list .item.active { background:#f3f6f7; }
    .autocomplete-list .item .navn { font-weight:600; }
    .autocomplete-list .item .meta { color:#666; font-size:12px; }
    .autocomplete-list .empty { padding:8px 10px; color:#666; font-size:13px; }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-inner">
      <div class="brand">Admin – Opret kundesurvey</div>
      <nav class="nav">
        <a href="./index.html">Hjem</a>
        <span class="sep">•</span>
        <a href="./admin.html">Admin</a>
        <span class="sep">•</span>
        <a href="./adminoversigt.html">Kundesurveys</a>
      </nav>
    </div>
  </div>
  <div class="nav-accent"></div>

  <div class="container">
    <header style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
      <div>
        <h1 style="margin:0;">Opret kundesurvey</h1>
        <div class="muted" style="margin-top:6px;">
          Vælg kunden fra listen, udfyld evt. prefill, og opret en ny kundesurvey med kode + link.
        </div>
      </div>
      <div class="muted" id="userInfo"></div>
    </header>

    <div class="grid2">
      <!-- Venstre: indstillinger -->
      <section class="card">
        <h2 style="margin-top:0;">Indstillinger</h2>

        <!-- Skema (auto-valgt, ingen manuel valg-mulighed når der kun findes ét aktivt skema) -->
        <div class="row" id="templateRow" style="display:none;">
          <label for="templateSelect">Skema</label>
          <select id="templateSelect"></select>
        </div>
        <div class="row" id="templateInfoRow">
          <label>Skema</label>
          <div class="muted" id="templateInfo" style="padding:.55rem 0;">Indlæser…</div>
        </div>

        <div class="row">
          <label for="customerName">Kunde</label>
          <div class="autocomplete">
            <input id="customerName" type="text" placeholder="Skriv navn eller kundenr…" autocomplete="off" />
            <div id="customerSuggest" class="autocomplete-list hidden"></div>
          </div>
        </div>

        <div class="row">
          <label for="expiresAt">Udløber (valgfri)</label>
          <input id="expiresAt" type="datetime-local" />
        </div>

        <div class="row">
          <label for="note">Intern note (valgfri)</label>
          <input id="note" type="text" placeholder="fx Februar kampagne – Nord" />
        </div>

        <div class="btnrow" style="margin-top:12px;">
          <button id="btnCreate">Opret kundesurvey</button>
          <span id="status" class="muted"></span>
        </div>

        <div id="result" class="hidden" style="margin-top:14px;">
          <div style="margin-bottom:8px;">
            <span class="pill">Kode</span> <strong id="codeOut"></strong>
          </div>
          <div class="muted">Kundelink:</div>
          <input id="linkOut" type="text" readonly style="margin-top:6px;" />
          <div class="btnrow" style="margin-top:10px;">
            <button id="btnCopy">Kopiér link</button>
            <a id="btnOpen" class="tag" href="#" target="_blank" rel="noopener">Åbn kunde</a>
            <a id="btnPrefill" class="tag" href="#">Prefill</a>
          </div>
        </div>
      </section>

      <!-- Højre: prefill -->
      <section class="card">
        <h2 style="margin-top:0;">Prefill</h2>
        <div class="muted" id="listStatus">Indlæser…</div>

        <div id="prefillArea" class="hidden">
          <table>
            <thead>
              <tr>
                <th style="width:90px;">Nr</th>
                <th>Spørgsmål</th>
                <th style="width:220px;">Gruppe</th>
                <th style="width:140px;">Svar-type</th>
                <th style="width:320px;">Prefill (valgfri)</th>
              </tr>
            </thead>
            <tbody id="qbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <!-- Auth guard -->
  <script type="module">
    import { requireAuth } from "./assets/auth-guard.js";
    requireAuth({ autoRedirect: true });
  </script>

  <script type="module" src="./assets/admincreate.js"></script>
</body>
</html>
